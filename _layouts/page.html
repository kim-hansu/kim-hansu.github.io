---
layout: default
---

<div class="post">
  {% if page.show_title != false %}
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-line"></div>
  {% endif %}

  {{ content }}
</div>

{% if page.show_top != false %}
<div class="pagination">
  <a href="#" class="top">Top</a>
</div>
{% endif %}
